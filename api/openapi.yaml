openapi: 3.0.3
info:
  description: |
    Real-time AliExpress data parser covering products, product reviews, sellers, store
    coupons, a seller's product catalog, and product search by text or image.
    Products: pricing, stock status, shipping options, seller information, product
    configurations (SKUs), and more - scoped to a specific country and currency.
    Reviews: customer ratings and feedback for a product.
    Sellers: full store profile with ratings, feedback, and categories.
    Coupons: active seller coupon codes with discounts, thresholds, budgets, and expiry.
    Seller products: a store's product catalog, paginated and best-selling first.
    Search: find products by keyword or by uploading an image, returning paginated product
    results with their categories.
  title: AliExpress Parser API
  version: "2.1"
  x-category: eCommerce
  x-long-description: |
    Fetches live data from AliExpress across several endpoints: product (by product ID, country,
    and currency), product reviews (by product ID), seller (store profile by store number),
    seller coupons (active coupon campaigns by store number, shipping country, and currency),
    seller products (a store's paginated product catalog by store number, shipping country, and
    currency), text search (products matching a keyword), and image search (products matching an
    uploaded image). Prices, shipping options, coupon eligibility, and search results are returned
    for the requested country and currency. Typical response time is 1-5 seconds.
servers:
- url: https://aligate-aliexpress-data-api.p.rapidapi.com
paths:
  /api/v2/product:
    get:
      description: |
        Returns detailed information for a single AliExpress product: title, images, pricing,
        available SKU variants, stock, shipping options, and seller details. Prices and
        shipping are resolved for the requested country and currency.
      operationId: Get Product Info
      parameters:
      - description: "AliExpress product ID, taken from the product page URL."
        explode: true
        in: query
        name: product_id
        required: true
        schema:
          example: 1005004530469845
          type: integer
        style: form
      - description: Country code (ISO 3166-1 alpha-2) used for pricing and shipping
          eligibility.
        explode: true
        in: query
        name: country
        required: true
        schema:
          enum:
          - US
          - CA
          - MX
          - BR
          - AR
          - CL
          - CO
          - PE
          - EC
          - UY
          - VE
          - CR
          - PA
          - DO
