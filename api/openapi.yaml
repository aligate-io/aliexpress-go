  /api/v2/search/image:
    post:
      description: |
        Finds AliExpress products that visually match an uploaded image. Provide the image as a
        base64-encoded string in the JSON body. Results are influenced by the requested shipping
        country and currency, and are paginated. A query with no visual matches returns HTTP 200
        with an empty products array.
      operationId: Search By Image
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImageSearchRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageSearchParseResponse"
          description: Image search completed (products is empty when there are no
            matches)
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: "Missing or invalid request body (image64, country and currency\
            \ are required)"
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Invalid or missing RapidAPI credentials
        "503":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Image-search parser not configured on this deployment
      summary: Search By Image
  /api/v2/search/text:
    get:
      description: |
        Searches AliExpress for a keyword and returns the matching products plus the available
        product categories for that query. Each product carries the card-level fields shown on the
        results page (title, image, price, rating, units sold) — full product detail (description,
        shipping, specifications, variations) is available via the Get Product Info endpoint.
        Results are influenced by the requested shipping country and currency, and are paginated.
        A query with no matches returns HTTP 200 with an empty products array.
      operationId: Search By Text
      parameters:
      - description: Search keyword.
        explode: true
        in: query
        name: query
        required: true
        schema:
          example: usb bluetooth adapter
          type: string
        style: form
      - description: Country code (ISO 3166-1 alpha-2) used for pricing and shipping
          eligibility.
        explode: true
        in: query
        name: country
        required: true
        schema:
          enum:
          - US
          - CA
          - MX
          - BR
          - AR
          - CL
          - CO
          - PE
          - EC
          - UY
          - VE
          - CR
          - PA
          - DO
          - GT
          - GB
          - IE
          - FR
          - DE
          - ES
          - PT
          - IT
          - NL
          - BE
          - LU
          - AT
          - CH
          - SE
