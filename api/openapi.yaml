          - FI
          - IS
          - PL
          - CZ
          - SK
          - HU
          - RO
          - BG
          - GR
          - HR
          - SI
          - LT
          - LV
          - EE
          - RS
          - UA
          - BY
          - RU
          - TR
          - IL
          - SA
          - AE
          - QA
          - KW
          - BH
          - OM
          - JO
          - LB
          - IQ
          - AZ
          - GE
          - KZ
          - UZ
          - CN
          - HK
          - TW
          - JP
          - KR
          - IN
          - PK
          - BD
          - LK
          - ID
          - TH
          - VN
          - MY
          - SG
          - PH
          - KH
          - AU
          - NZ
          - ZA
          - NG
          - EG
          - MA
          - DZ
          - TN
          - KE
          - GH
          example: PL
          type: string
        style: form
      - description: Currency code (ISO 4217) for the returned prices.
        explode: true
        in: query
        name: currency
        required: true
        schema:
          enum:
          - USD
          - EUR
          - GBP
          - AUD
          - CAD
          - RUB
          - BRL
          - CLP
          - COP
          - MXN
          - ILS
          - INR
          - JPY
          - KRW
          - NOK
          - NZD
          - PHP
          - PLN
          - SEK
          - THB
          - TRY
          - UAH
          - VND
          - IDR
          - AED
          - SAR
          - CHF
          - CZK
          - DKK
          - HKD
          - HUF
          - SGD
          - ZAR
          - KZT
          - MYR
          - TWD
          example: PLN
          type: string
        style: form
      - description: Response language locale.
        explode: true
        in: query
        name: locale
        required: false
        schema:
          default: en_US
          enum:
          - en_US
          - en_GB
          - es_ES
          - es_CO
          - pt_BR
          - pt_PT
          - fr_FR
          - de_DE
          - it_IT
          - nl_NL
          - pl_PL
          - ru_RU
          - ru_PL
          - tr_TR
          - ko_KR
          - ja_JP
          - th_TH
          - vi_VN
          - id_ID
          - ar_SA
          - he_IL
          - uk_UA
          - zh_CN
          example: en_US
          type: string
        style: form
      - description: Apply the new-buyer welcome discount to the returned price.
        explode: true
        in: query
        name: with_welcome_discount
        required: false
        schema:
          default: false
          example: false
          type: boolean
        style: form
      - description: |
          Fetch the full product description (formatted HTML, plain text, and image gallery), returned in the `description` field. Note: enabling this adds approximately 600-750 ms to the response time.
        explode: true
        in: query
        name: with_description
        required: false
        schema:
          default: false
          example: false
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParseResponse"
          description: Product data successfully parsed
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Missing or invalid query parameters
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Invalid or missing RapidAPI credentials
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Product not found on AliExpress
        "502":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Upstream parser error
      summary: Get Product Info
  /api/v2/product/reviews:
    get:
      description: |
        Returns buyer reviews for an AliExpress product, including the rating, buyer, review
        text (with translation when available), images, and seller replies, plus a per-star
        rating breakdown. Results are paginated and can be filtered (for example, only reviews
        with images or a specific star rating) and sorted. A product with no reviews returns
        HTTP 200 with an empty reviews array.
