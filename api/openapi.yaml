          - tr_TR
          - ko_KR
          - ja_JP
          - th_TH
          - vi_VN
          - id_ID
          - ar_SA
          - he_IL
          - uk_UA
          - zh_CN
          example: en_US
          type: string
        style: form
      - description: Page number of reviews to return (starts at 1).
        explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          example: 1
          type: integer
        style: form
      - description: Number of reviews per page (maximum 20).
        explode: true
        in: query
        name: page_size
        required: false
        schema:
          default: 20
          example: 20
          type: integer
        style: form
      - description: |
          Restrict reviews to a subset. image = with photos, additional = with follow-up feedback, local = from the requested country, 1-5 = that star rating. Empty = all.
        explode: true
        in: query
        name: filter
        required: false
        schema:
          enum:
          - image
          - additional
          - local
          - "1"
          - "2"
          - "3"
          - "4"
          - "5"
          type: string
        style: form
      - description: Sort order for the returned reviews.
        explode: true
        in: query
        name: sort
        required: false
        schema:
          default: complex_default
          enum:
          - complex_default
          - valid_date
          example: complex_default
          type: string
        style: form
